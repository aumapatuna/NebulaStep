name: Generate Core Keystore

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Generate Stable Keystore
      run: |
        # Generate the keystore that never changes
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=NebulaStep,O=Android,C=US"
        
        # Print the SHA-1 and SHA-256 for the user to copy into Firebase!
        echo "=========================================================="
        echo "🔥 YOUR FIREBASE FINGERPRINTS 🔥"
        echo "=========================================================="
        keytool -list -v -keystore app/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA"
        echo "=========================================================="

    - name: Commit Keystore to Repository
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Add static Android debug.keystore for Google Sign-In"
        file_pattern: "app/debug.keystore"
